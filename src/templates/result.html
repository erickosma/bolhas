<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado — Product Crawler</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md flex flex-col gap-4">
        <h1 class="text-3xl font-bold text-center text-gray-800">Product Crawler</h1>

        {% if error %}
        <p class="p-3 bg-red-50 text-red-700 rounded-lg border border-red-200">{{ error }}</p>
        {% endif %}

        {% if product %}
        <div class="bg-white rounded-lg shadow p-6 flex flex-col gap-3">
            <h2 class="text-xl font-semibold text-gray-800">{{ product.title }}</h2>

            {% if product.images %}
            <div class="flex gap-2 overflow-x-auto py-2">
                {% for img_url in product.images %}
                <img src="{{ img_url }}" alt="Imagem do produto" class="w-48 h-48 object-contain rounded border border-gray-200 flex-shrink-0" loading="lazy">
                {% endfor %}
            </div>
            {% endif %}

            <p class="text-lg font-bold text-green-700">{{ product.price }}</p>

            <p class="text-gray-600 leading-relaxed">{{ product.description }}</p>
        </div>
        {% endif %}

        <a href="/" class="text-blue-600 hover:underline text-center">Voltar</a>
    </div>
</body>
</html>
