<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Crawler</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">Product Crawler</h1>
        <form method="POST" action="/scrape" class="flex flex-col gap-4">
            <input
                type="text"
                name="url"
                placeholder="Insira a URL do produto"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg text-base
                       focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            >
            <button
                type="submit"
                class="w-full px-4 py-3 bg-blue-600 text-white font-medium rounded-lg
                       hover:bg-blue-700 transition-colors text-base cursor-pointer"
            >
                Buscar produto
            </button>
        </form>
        {% if error %}
        <p class="mt-4 p-3 bg-red-50 text-red-700 rounded-lg border border-red-200">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
